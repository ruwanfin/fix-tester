server:
  port: 8091

spring:
  application:
    name: finexa-fix-tester

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 500
      fetch-min-size: 1
      fetch-max-wait: 500ms

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# Kafka producer configuration (for FIX Client)
exchange:
  message:
    topic: from-exchange

kafka:
  producer:
    acks: all
    retries: 3
    batch-size: 16384
    linger-ms: 1
    buffer-memory: 33554432

# Application specific configuration (for Kafka Consumers)
app:
  kafka:
    topic: ${KAFKA_TOPIC:to-db}

    # DB Consumer - receives ALL messages
    db-consumer:
      enabled: true
      group-id: ${KAFKA_DB_CONSUMER_GROUP:db-consumer-group}
      concurrency: 3

    # Exchange Consumer - receives only messages with routingTarget=ALL
    exchange-consumer:
      enabled: true
      group-id: ${KAFKA_EXCHANGE_CONSUMER_GROUP:exchange-consumer-group}
      concurrency: 3

# Logging configuration
logging:
  level:
    root: INFO
    com.finexa.fixtester: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
